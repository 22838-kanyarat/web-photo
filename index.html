<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแสดงแผนภาพภูมิภาคประเทศไทย</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: #1e293b;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.2rem;
            color: #0f172a;
            margin-bottom: 8px;
            font-weight: 700;
        }

        header p {
            color: #64748b;
            font-size: 1.1rem;
        }

        /* โครงสร้างหลักแบบสมมาตร */
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.02);
            border: 1px solid #e2e8f0;
        }

        /* ฝั่งซ้าย: แผนภาพ SVG */
        .map-wrapper {
            background-color: #f1f5f9;
            border-radius: 16px;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #e2e8f0;
        }

        .thailand-map {
            width: 100%;
            max-width: 360px;
            height: auto;
        }

        /* เอฟเฟกต์ปฏิสัมพันธ์เมื่อชี้เมาส์ (Interactive Areas) */
        .map-region {
            cursor: pointer;
            transition: all 0.25s ease;
            stroke: #ffffff;
            stroke-width: 3;
            stroke-linejoin: round;
        }

        .map-region:hover {
            fill-opacity: 0.85;
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.12));
        }

        /* โทนสีประจำภูมิภาค */
        #region-n { fill: #3b82f6; } /* เหนือ - ฟ้า */
        #region-ne { fill: #f97316; } /* อีสาน - ส้ม */
        #region-c { fill: #10b981; } /* กลาง - เขียว */
        #region-e { fill: #eab308; } /* ตะวันออก - เหลือง */
        #region-w { fill: #8b5cf6; } /* ตะวันตก - ม่วง */
        #region-s { fill: #ef4444; } /* ใต้ - แดง */

        /* ฝั่งขวา: การ์ดแสดงผลข้อมูลและรูปภาพ */
        .display-wrapper {
            display: flex;
            flex-direction: column;
        }

        .info-panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 30px;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .panel-active {
            border-color: #3b82f6;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.08);
        }

        .region-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f1f5f9;
        }

        .region-desc {
            font-size: 1.05rem;
            line-height: 1.65;
            color: #475569;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        /* พื้นที่จองสำหรับบล็อกรูปภาพ (Image Container) */
        .image-viewport {
            width: 100%;
            height: 240px;
            background-color: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-weight: 500;
            overflow: hidden;
            position: relative;
        }

        .image-viewport img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Responsive Layout สำหรับแท็บเล็ตและมือถือ */
        @media (max-width: 768px) {
            .dashboard-container {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>แผนภาพแสดงข้อมูลภูมิภาคประเทศไทย</h1>
        <p>เลือกคลิกภูมิภาคบนแผนที่เพื่อเรียกดูระบบสารสนเทศและรูปภาพประจำถิ่น</p>
    </header>

    <div class="dashboard-container">
        
        <div class="map-wrapper">
            <svg class="thailand-map" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
                <path id="region-n" class="map-region" d="M 120 40 L 240 40 L 260 140 L 190 200 L 110 150 Z" onclick="updateDisplay('north')"/>
                <text x="170" y="100" fill="white" font-weight="600" pointer-events="none">ภาคเหนือ</text>

                <path id="region-ne" class="map-region" d="M 241 145 L 380 140 L 370 300 L 240 280 L 210 200 Z" onclick="updateDisplay('northeast')"/>
                <text x="270" y="210" fill="white" font-weight="600" pointer-events="none">ภาคอีสาน</text>

                <path id="region-c" class="map-region" d="M 160 205 L 235 205 L 235 320 L 170 320 L 150 250 Z" onclick="updateDisplay('central')"/>
                <text x="175" y="265" fill="white" font-weight="600" pointer-events="none">ภาคกลาง</text>

                <path id="region-w" class="map-region" d="M 105 160 L 155 210 L 145 260 L 165 330 L 120 330 L 110 240 Z" onclick="updateDisplay('west')"/>
                <text x="105" y="280" fill="white" font-weight="600" pointer-events="none">ภาคตะวันตก</text>

                <path id="region-e" class="map-region" d="M 238 290 L 300 300 L 280 370 L 220 340 Z" onclick="updateDisplay('east')"/>
                <text x="235" y="335" fill="white" font-weight="600" pointer-events="none">ภาคตะวันออก</text>

                <path id="region-s" class="map-region" d="M 135 335 L 175 335 L 160 450 L 210 520 L 170 580 L 120 440 Z" onclick="updateDisplay('south')"/>
                <text x="140" y="450" fill="white" font-weight="600" pointer-events="none">ภาคใต้</text>
            </svg>
        </div>

        <div class="display-wrapper">
            <div id="infoPanel" class="info-panel">
                <h2 id="regionTitle" class="region-title">ยินดีต้อนรับ</h2>
                <div id="regionDesc" class="region-desc">
                    กรุณาเลือกกดที่พื้นที่บนแผนที่จำลองประเทศไทยฝั่งซ้ายมือ เพื่อแสดงข้อมูลรายละเอียดโครงสร้างทางภูมิศาสตร์ วัฒนธรรม และรูปภาพประกอบของภาคนั้นๆ
                </div>
                
                <div class="image-viewport" id="imageArea">
                    <span>รอการเชื่อมต่อรูปภาพภูมิภาค</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        // คลังข้อมูลภูมิภาคและจุดตั้งค่ารูปภาพ
        const database = {
            north: {
                title: "ภาคเหนือ",
                desc: "ภูมิประเทศส่วนใหญ่ประกอบไปด้วยเทือกเขาสลับซับซ้อน เป็นแหล่งกำเนิดของแม่น้ำสายสำคัญ มีวัฒนธรรม ขนบธรรมเนียมล้านนาที่เป็นเอกลักษณ์เฉพาะตัว รวมถึงสถานที่ท่องเที่ยวตามดอยสูงต่างๆ",
                imageSrc: "" // <-- สามารถนำลิงก์หรือชื่อไฟล์รูปภาพภาคเหนือมาใส่ในเครื่องหมายคำพูดนี้ได้เลย เช่น "north.jpg"
            },
            northeast: {
                title: "ภาคตะวันออกเฉียงเหนือ",
                desc: "หรือพื้นที่สะท้อนอารยธรรม 'อีสาน' เป็นที่ราบสูงขนาดใหญ่ที่เปี่ยมไปด้วยประวัติศาสตร์ทางธรณีวิทยา แหล่งโบราณคดี เทศกาลประเพณีทางศาสนาที่ยิ่งใหญ่ และอาหารท้องถิ่นรสชาติจัดจ้าน",
                imageSrc: "" // <-- ตัวอย่าง: "images/isan.png"
            },
            central: {
                title: "ภาคกลาง",
                desc: "พื้นที่ราบลุ่มแม่น้ำขนาดใหญ่ที่เป็นศูนย์กลางทางเศรษฐกิจ ประวัติศาสตร์ และการปกครองของประเทศ เป็นแหล่งเกษตรกรรมและอู่ข้าวอู่น้ำที่สำคัญหลักของประเทศไทย",
                imageSrc: ""
            },
            east: {
                title: "ภาคตะวันออก",
                desc: "ภูมิภาคที่มีพื้นที่ติดชายฝั่งทะเลอ่าวไทย มีความโดดเด่นทั้งในด้านอุตสาหกรรมหลักของประเทศ แหล่งท่องเที่ยวทางทะเลที่ได้รับความนิยมระดับสากล และสวนผลไม้เมืองร้อนนานาชนิด",
                imageSrc: ""
            },
            west: {
                title: "ภาคตะวันตก",
                desc: "เขตแนวกั้นทางภูมิศาสตร์ที่เต็มไปด้วยเทือกเขาสูงชันและผืนป่าตะวันตกอันอุดมสมบูรณ์ โดดเด่นด้วยกิจกรรมท่องเที่ยวเชิงอนุรักษ์ธรรมชาติ เขื่อนขนาดใหญ่ และสถานที่ทางประวัติศาสตร์",
                imageSrc: ""
            },
            south: {
                title: "ภาคใต้",
                desc: "คาบสมุทรขนาบด้วยฝั่งทะเลอ่าวไทยและอันดามัน มีทัศนียภาพหมู่เกาะและชายหาดที่สวยงามระดับโลก วัฒนธรรมมีเอกลักษณ์เฉพาะตัวทั้งด้านดนตรี ภาษา และอาหารรสเผ็ดร้อน",
                imageSrc: ""
            }
        };

        // ฟังก์ชันในการอัปเดตข้อมูลและรูปภาพในแผงควบคุม
        function updateDisplay(key) {
            const data = database[key];
            
            // เปลี่ยนข้อความพาดหัวและรายละเอียด
            document.getElementById('regionTitle').innerText = data.title;
            document.getElementById('regionDesc').innerText = data.desc;
            
            const imageArea = document.getElementById('imageArea');
            
            // ระบบตรวจสอบและสลับการแสดงผลรูปภาพอัตโนมัติ
            if (data.imageSrc && data.imageSrc !== "") {
                // หากคุณใส่ชื่อไฟล์หรือ URL รูปภาพในฐานข้อมูลด้านบน ระบบจะดึงรูปภาพมาแสดงทันที
                imageArea.innerHTML = `<img src="${data.imageSrc}" alt="รูปภาพประกอบ${data.title}">`;
            } else {
                // หากยังไม่ได้ใส่รูปภาพ ระบบจะขึ้นข้อความแจ้งเตือนสีสันตามภาคเพื่อความสวยงาม
                imageArea.innerHTML = `<span>📷 [พื้นที่แสดงรูปภาพของ ${data.title}]</span>`;
            }

            // เพิ่มลูกเล่นแอนิเมชันตอนสลับกล่องข้อมูล
            const panel = document.getElementById('infoPanel');
            panel.classList.remove('panel-active');
            void panel.offsetWidth; // บังคับให้เบราว์เซอร์รีเซ็ตแอนิเมชัน
            panel.classList.add('panel-active');
        }
    </script>
</body>
</html>
