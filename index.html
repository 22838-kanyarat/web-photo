<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแสดงแผนภาพสัตว์เลี้ยงที่ฉันชอบ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght=300;400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: #fff7ed; /* เปลี่ยนเป็นโทนอุ่นนุ่มนวล */
            color: #1e293b;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.2rem;
            color: #7c2d12;
            margin-bottom: 8px;
            font-weight: 700;
        }

        header p {
            color: #9a3412;
            font-size: 1.1rem;
        }

        /* โครงสร้างหลักแบบสมมาตร */
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(124, 45, 18, 0.05);
            border: 1px solid #fed7aa;
        }

        /* ฝั่งซ้าย: แผนภาพเลือกสัตว์เลี้ยง */
        .map-wrapper {
            background-color: #fffaf5;
            border-radius: 16px;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #ffedd5;
        }

        .pet-selector-svg {
            width: 100%;
            max-width: 360px;
            height: auto;
        }

        /* เอฟเฟกต์ปฏิสัมพันธ์เมื่อชี้เมาส์ */
        .pet-zone {
            cursor: pointer;
            transition: all 0.25s ease;
            stroke: #ffffff;
            stroke-width: 4;
        }

        .pet-zone:hover {
            fill-opacity: 0.9;
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.1));
        }

        /* โทนสีประจำสัตว์เลี้ยง */
        #pet-dog { fill: #3b82f6; } /* หมา - ฟ้าสดใส */
        #pet-cat { fill: #f97316; } /* แมว - ส้มขี้เล่น */
        #pet-pig { fill: #ec4899; } /* หมู - ชมพูน่ารัก */

        /* ฝั่งขวา: การ์ดแสดงผลข้อมูลและรูปภาพ */
        .display-wrapper {
            display: flex;
            flex-direction: column;
        }

        .info-panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 30px;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .panel-active {
            border-color: #f97316;
            box-shadow: 0 4px 20px rgba(249, 115, 22, 0.1);
        }

        .region-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f1f5f9;
        }

        .region-desc {
            font-size: 1.05rem;
            line-height: 1.65;
            color: #475569;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        /* พื้นที่จองสำหรับบล็อกรูปภาพ */
        .image-viewport {
            width: 100%;
            height: 240px;
            background-color: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-weight: 500;
            overflow: hidden;
            position: relative;
        }

        .image-viewport img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Responsive Layout */
        @media (max-width: 768px) {
            .dashboard-container {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>สัตว์เลี้ยงแสนรักของฉัน 🐶🐱🐷</h1>
        <p>คลิกเลือกสัตว์เลี้ยงในแผนภาพฝั่งซ้าย เพื่อดูข้อมูลและรูปภาพของพวกมัน</p>
    </header>

    <div class="dashboard-container">
        
        <div class="map-wrapper">
            <svg class="pet-selector-svg" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
                <circle id="pet-dog" class="pet-zone" cx="200" cy="110" r="80" onclick="updateDisplay('dog')"/>
                <text x="200" y="115" fill="white" font-weight="600" font-size="18" text-anchor="middle" pointer-events="none">สุนัข (Dog)</text>

                <circle id="pet-cat" class="pet-zone" cx="110" cy="320" r="80" onclick="updateDisplay('cat')"/>
                <text x="110" y="325" fill="white" font-weight="600" font-size="18" text-anchor="middle" pointer-events="none">แมว (Cat)</text>

                <circle id="pet-pig" class="pet-zone" cx="290" cy="320" r="80" onclick="updateDisplay('pig')"/>
                <text x="290" y="325" fill="white" font-weight="600" font-size="18" text-anchor="middle" pointer-events="none">หมู (Pig)</text>
            </svg>
        </div>

        <div class="display-wrapper">
            <div id="infoPanel" class="info-panel">
                <h2 id="regionTitle" class="region-title">ยินดีต้อนรับสู่บ้านสัตว์เลี้ยง</h2>
                <div id="regionDesc" class="region-desc">
                    กรุณากดเลือกสัตว์เลี้ยงที่คุณสนใจจากแผนภาพทางซ้ายมือ เพื่อดูข้อมูลพฤติกรรม นิสัยใจคอ และรูปภาพความน่ารักของพวกมันกันเลย!
                </div>
                
                <div class="image-viewport" id="imageArea">
                    <span>รอการเลือกสัตว์เลี้ยงเพื่อแสดงรูปภาพ</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        // คลังข้อมูลสัตว์เลี้ยง
        const database = {
            dog: {
                title: "สุนัข (Dog) 🐶",
                desc: "เพื่อนแท้ที่ซื่อสัตย์ที่สุดของมนุษย์ มีนิสัยร่าเริง ฉลาด แสนรู้ และชอบเข้าสังคม สุนัขสามารถรับรู้ความรู้สึกของเจ้าของได้เป็นอย่างดี แถมยังชอบทำกิจกรรมกลางแจ้ง เดินเล่น และวิ่งคาบบอลเป็นที่สุด",
                imageSrc: "" // <-- นำลิงก์รูปภาพสุนัขมาใส่ตรงนี้ได้เลย เช่น "https://example.com/dog.jpg"
            },
            cat: {
                title: "แมว (Cat) 🐱",
                desc: "เจ้านายตัวน้อยที่มีนิสัยรักอิสระและมีความเป็นตัวเองสูง บางเวลาก็ดูลึกลับน่าค้นหา แต่บางเวลาก็ขี้อ้อนจนใจละลาย ชอบนอนหลับในที่อุ่นๆ นั่งส่องนกริมหน้าต่าง และส่งเสียงครางเครือ (Purr) เวลาที่มีความสุข",
                imageSrc: "" // <-- นำลิงก์รูปภาพแมวมาใส่ตรงนี้ได้เลย
            },
            pig: {
                title: "หมู (Pig) 🐷",
                desc: "สัตว์เลี้ยงทางเลือกใหม่ที่พกพาความน่ารักมาเต็มเปี่ยม! หมูเป็นสัตว์ที่ฉลาดและสะอาดกว่าที่หลายคนคิด (พวกมันแยกที่นอนและที่ขับถ่ายชัดเจน) มีนิสัยรักสงบ อ่อนโยน และที่สำคัญคือเห็นแก่กินเป็นที่สุด!",
                imageSrc: "" // <-- นำลิงก์รูปภาพหมูมาใส่ตรงนี้ได้เลย
            }
        };

        // ฟังก์ชันในการอัปเดตข้อมูลและรูปภาพในแผงควบคุม
        function updateDisplay(key) {
            const data = database[key];
            
            // เปลี่ยนข้อความพาดหัวและรายละเอียด
            document.getElementById('regionTitle').innerText = data.title;
            document.getElementById('regionDesc').innerText = data.desc;
            
            const imageArea = document.getElementById('imageArea');
            
            // ระบบตรวจสอบและสลับการแสดงผลรูปภาพอัตโนมัติ
            if (data.imageSrc && data.imageSrc !== "") {
                imageArea.innerHTML = `<img src="${data.imageSrc}" alt="รูปภาพของ${data.title}">`;
            } else {
                imageArea.innerHTML = `<span>📷 [พื้นที่แสดงรูปภาพของ ${data.title}]</span>`;
            }

            // เพิ่มลูกเล่นแอนิเมชันตอนสลับกล่องข้อมูล
            const panel = document.getElementById('infoPanel');
            panel.classList.remove('panel-active');
            void panel.offsetWidth; // บังคับให้เบราว์เซอร์รีเซ็ตแอนิเมชัน
            panel.classList.add('panel-active');
        }
    </script>
</body>
</html>
